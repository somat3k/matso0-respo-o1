name: docs

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/**"
      - "configs/**"
      - "regime/**"
      - "scripts/check_docs.py"
      - "scripts/validate_configs.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run validation
        run: |
          python scripts/check_docs.py
          python scripts/validate_configs.py
