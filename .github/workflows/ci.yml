name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-and-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate docs and configs
        run: |
          python scripts/check_docs.py
          python scripts/validate_configs.py

  rust-workspace-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Rust workspace scaffold present; enable cargo checks when toolchain is added."
